<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoFort-LLC</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        h1 {
            color: #333;
        }
        .button-container {
            margin: 20px 0;
        }
        button {
            background-color: #E50914;
            color: white;
            border: none;
            padding: 12px 20px;
            margin: 5px;
            cursor: pointer;
            font-size: 16px;
            border-radius: 5px;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #b20710;
        }
        a {
            display: block;
            margin-top: 15px;
            text-decoration: none;
            font-size: 18px;
            color: #E50914;
            font-weight: bold;
        }
        a:hover {
            text-decoration: underline;
        }
        footer {
            margin-top: 30px;
            padding: 10px;
            background: #222;
            color: white;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>Welcome to GeoFort-LLC</h1>

    <div class="button-container">
        <button onclick="alert('Button 1 clicked!')">CLICK HERE</button>
        <button onclick="alert('Button 2 clicked!')">CLICK HERE</button>
        <button onclick="alert('Button 3 clicked!')">CLICK HERE</button>
    </div>

    <a href="https://www.netflix.com/browse" target="_blank" rel="noopener noreferrer">Visit My Netflix</a>

    <footer>Created by Karl-Dee &copy; 2025</footer>
</body>
</html>
