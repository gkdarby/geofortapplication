version: 0.0
os: linux

files:
  - source: /target/hello-world-web-app.war
    destination: /tmp/geofort-deploy

hooks:
  BeforeInstall:
    - location: scripts/install_dependencies.sh
      timeout: 900
      runas: root

  ApplicationStop:
    - location: scripts/stop_server.sh
      timeout: 300
      runas: root

  AfterInstall:
    - location: scripts/deploy_war.sh
      timeout: 900
      runas: root

  ApplicationStart:
    - location: scripts/start_server.sh
      timeout: 900
      runas: root
